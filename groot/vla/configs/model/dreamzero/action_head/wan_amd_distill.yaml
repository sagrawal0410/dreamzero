# @package _global_

defaults:
  - wan_flow_matching_action_tf_wan22

action_head_cfg:
  _target_: groot.vla.model.dreamzero.action_head.wan_amd_distill.WANPolicyHeadAMD
  _convert_: object
  config:
    _target_: groot.vla.model.dreamzero.action_head.wan_amd_distill.WANPolicyHeadAMDConfig

    enable_amd_distill: true
    distill_output_coeff: 1.0
    distill_hidden_coeff: 0.0
    distill_hidden_layer: -1
    distill_hidden_target: noisy
    distill_timestep_weighting: true
    teacher_dropout_prob: 0.0
    require_lora: true
