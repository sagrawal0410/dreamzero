# @package _global_

defaults:
  - wan_amd_distill

action_head_cfg:
  _target_: groot.vla.model.dreamzero.action_head.wan_amd_distill_trust_region.WANPolicyHeadAMDTrustRegion
  config:
    _target_: groot.vla.model.dreamzero.action_head.wan_amd_distill_trust_region.WANPolicyHeadAMDTrustRegionConfig

    enable_amd_distill: true
    distill_output_coeff: 1.0
    distill_hidden_coeff: 0.0
    distill_hidden_layer: -1
    distill_hidden_target: noisy
    distill_timestep_weighting: true
    teacher_dropout_prob: 0.0
    require_lora: true

    enable_token_weighting: true
    weight_predictor_hidden_dim: 64
    weight_predictor_num_layers: 2
    weight_predictor_use_teacher_hidden: false
    motion_prior_strength: 4.0
    motion_prior_learnable: true
    initial_weight_target: 0.7
    weight_mean_target: 0.5
    weight_mean_reg_coeff: 0.05
    weight_entropy_coeff: 0.0
    weight_min: 0.0
    weight_max: 1.0
